<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>あなたの感覚タイプ診断</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Segoe UI", "Noto Sans JP", sans-serif;
      background: #f6f8f7;
      margin: 0;
      padding: 16px 10px 28px;
      color: #333;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #78c8a6, #5ba98d);
      color: #fff;
      padding: 22px 18px;
      text-align: center;
    }

    .header h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.4;
      font-weight: 700;
    }

    .content,
    .result-screen {
      padding: 18px 16px 22px;
    }

    .intro {
      background: #f2faf6;
      border: 1px solid #d8eee3;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 18px;
      line-height: 1.9;
      font-size: 14px;
      white-space: pre-line;
    }

    .section-label {
      display: block;
      margin-bottom: 10px;
      padding: 10px 12px;
      background: #5ba98d;
      color: #fff;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      line-height: 1.6;
    }

    .section-label .sub {
      display: block;
      margin-top: 4px;
      font-size: 12px;
      font-weight: 400;
      color: #eefcf5;
    }

    .question-list {
      display: grid;
      gap: 10px;
      margin-bottom: 18px;
    }

    .question-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: #fafafa;
      border: 1px solid #e4e4e4;
      border-radius: 12px;
      padding: 12px;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .question-item.selected {
      border-color: #5ba98d;
      background: #f2faf6;
      box-shadow: 0 0 0 1px rgba(91, 169, 141, 0.15);
    }

    .question-item.disabled {
      opacity: 0.55;
    }

    .question-item input[type="checkbox"] {
      margin-top: 2px;
      transform: scale(1.15);
      accent-color: #5ba98d;
      flex-shrink: 0;
    }

    .question-text {
      font-size: 14px;
      line-height: 1.7;
    }

    .submit-button,
    .send-button {
      width: 100%;
      border: none;
      border-radius: 999px;
      color: #fff;
      padding: 15px 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .submit-button {
      background: #df6b7b;
      margin-top: 8px;
    }

    .send-button {
      background: #06c755;
      margin-top: 18px;
    }

    .helper {
      margin-top: 4px;
      font-size: 12px;
      color: #666;
      text-align: center;
      line-height: 1.6;
    }

    .loading-overlay {
      display: none;
      min-height: 360px;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 40px 20px;
      box-sizing: border-box;
    }

    .loading-overlay.active {
      display: flex;
    }

    .spinner {
      width: 44px;
      height: 44px;
      border: 4px solid #d9efe6;
      border-top: 4px solid #5ba98d;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }

    .loading-text {
      font-size: 14px;
      color: #5a7e6f;
      font-weight: 600;
    }

    .result-screen,
    .loading-overlay {
      display: none;
    }

    .result-screen.active {
      display: block;
    }

    .result-box {
      padding: 16px 14px;
      border-radius: 14px;
      background: #f7fbf9;
      border: 1px solid #dbece4;
      margin-top: 12px;
    }

    .result-type {
      font-size: 24px;
      font-weight: 800;
      color: #356b57;
      margin-bottom: 10px;
    }

    .result-description {
      font-size: 14px;
      line-height: 1.8;
      color: #333;
      white-space: pre-line;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @media (max-width: 480px) {
      .header h1 {
        font-size: 22px;
      }

      .question-text,
      .result-description {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>あなたの感覚タイプ診断</h1>
    </div>

    <div id="questionScreen" class="content">
      <div class="intro">なんとなく気になる
理由はわからないけれど惹かれる

そんな感覚、ありませんか？

実はそれ、
あなたの中にある“感覚のクセ”かもしれません

簡単なチェックで、
あなたのタイプを知ることができます🌿</div>

      <div class="section-label">
        【質問（チェック式）】
        <span class="sub">強く当てはまるものを3つ選んでください</span>
      </div>

      <div class="question-list" id="questionList">
        <label class="question-item"><input type="checkbox" name="question" value="1"><span class="question-text">① 理由はないけど「これだ」と感じて決めることが多い</span></label>
        <label class="question-item"><input type="checkbox" name="question" value="2"><span class="question-text">② なぜか予感が的中することが多い</span></label>
        <label class="question-item"><input type="checkbox" name="question" value="3"><span class="question-text">③ 深く考える前に答えが浮かぶことがある</span></label>
        <label class="question-item"><input type="checkbox" name="question" value="4"><span class="question-text">④ 色やデザインで気分が変わる</span></label>
        <label class="question-item"><input type="checkbox" name="question" value="5"><span class="question-text">⑤ 説明する時、図や写真を使いたくなる</span></label>
        <label class="question-item"><input type="checkbox" name="question" value="6"><span class="question-text">⑥ 頭の中にイメージが浮かんで決める</span></label>
        <label class="question-item"><input type="checkbox" name="question" value="7"><span class="question-text">⑦ 人や場所の雰囲気に影響を受けやすい</span></label>
        <label class="question-item"><input type="checkbox" name="question" value="8"><span class="question-text">⑧ 場所によって落ち着き方が違う</span></label>
        <label class="question-item"><input type="checkbox" name="question" value="9"><span class="question-text">⑨ なんとなく居心地の悪い場所がわかる</span></label>
      </div>

      <button id="diagnoseButton" class="submit-button" type="button">あなたのタイプを見てみる</button>
    </div>

    <div id="loadingScreen" class="loading-overlay">
      <div class="spinner"></div>
      <div class="loading-text">診断中...</div>
    </div>

    <div id="resultScreen" class="result-screen">
      <div class="helper">診断結果</div>
      <div class="result-box">
        <div id="resultType" class="result-type"></div>
        <div id="resultDescription" class="result-description"></div>
      </div>
      <button id="sendButton" class="send-button" type="button">LINEに送る</button>
    </div>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2.1/sdk.js"></script>
  <script>
    const LIFF_ID = '2009684850-jcgBkTJo';

    const typeDescriptions = {
      '直感タイプ': `診断お疲れさまでした🌿

あなたは【直感タイプ】の傾向があります

もしかすると、

「なんとなく当たることがある」
そんな感覚、ありませんか？

実はそれ、
すでにあなたが持っている感覚です

👉このあと5日間で、
その感覚を少しずつ整理していきます

【直感タイプ】の方専用の内容が５回に分かれて届きますのでお楽しみに✨`,
      'イメージタイプ': `診断お疲れさまでした🌿

あなたは【イメージタイプ】の傾向があります

もしかすると

・同じ言葉や数字をよく見る
・なぜか気になるデザインや形がある

そんなことはありませんか？

あなたは、
イメージを通して世界を理解する力を持っています

👉これから5日間で
その感覚に少しずつ触れていきます

【イメージタイプ】の方専用の内容が５回に分かれて届きますのでお楽しみに✨`,
      '空間共鳴タイプ': `診断お疲れさまでした🌿

あなたは【空間共鳴タイプ】の傾向があります

もしかすると

・場所によって落ち着き方が違う
・なぜか疲れる場所がある

そんな感覚、ありませんか？

実はそれ、
あなたが空間の影響を受け取りやすいサインかもしれません

👉これから5日間で
その感覚を少しずつ整理していきます

【空間共鳴タイプ】の方専用の内容が５回に分かれて届きますのでお楽しみに✨`,
      'バランス感覚タイプ': `診断お疲れさまでした🌿

あなたは【バランス感覚タイプ】の傾向があります

直感・イメージ・空間への感受性をバランスよく持っているタイプです。

その時々に必要な感覚を自然に使い分けられるのが、あなたの魅力かもしれません。`
    };

    const questionGroups = {
      1: '直感タイプ',
      2: '直感タイプ',
      3: '直感タイプ',
      4: 'イメージタイプ',
      5: 'イメージタイプ',
      6: 'イメージタイプ',
      7: '空間共鳴タイプ',
      8: '空間共鳴タイプ',
      9: '空間共鳴タイプ'
    };

    let latestMessage = '';
    let liffReady = false;

    const checkboxes = Array.from(document.querySelectorAll('input[name="question"]'));
    const diagnoseButton = document.getElementById('diagnoseButton');
    const sendButton = document.getElementById('sendButton');
    const questionScreen = document.getElementById('questionScreen');
    const loadingScreen = document.getElementById('loadingScreen');
    const resultScreen = document.getElementById('resultScreen');
    const resultTypeEl = document.getElementById('resultType');
    const resultDescriptionEl = document.getElementById('resultDescription');

    function getCheckedBoxes() {
      return checkboxes.filter((cb) => cb.checked);
    }

    function syncCheckboxState() {
      const checkedCount = getCheckedBoxes().length;

      checkboxes.forEach((checkbox) => {
        const item = checkbox.closest('.question-item');
        checkbox.disabled = !checkbox.checked && checkedCount >= 3;
        item.classList.toggle('selected', checkbox.checked);
        item.classList.toggle('disabled', checkbox.disabled);
      });
    }

    checkboxes.forEach((checkbox) => {
      checkbox.addEventListener('change', (event) => {
        if (getCheckedBoxes().length > 3) {
          event.target.checked = false;
          alert('選択は3つまでです。');
        }
        syncCheckboxState();
      });
    });

    function getDiagnosisResult(selectedValues) {
      const counts = {
        '直感タイプ': 0,
        'イメージタイプ': 0,
        '空間共鳴タイプ': 0
      };

      selectedValues.forEach((value) => {
        const type = questionGroups[value];
        if (type) counts[type] += 1;
      });

      if (counts['直感タイプ'] >= 2) return '直感タイプ';
      if (counts['イメージタイプ'] >= 2) return 'イメージタイプ';
      if (counts['空間共鳴タイプ'] >= 2) return '空間共鳴タイプ';
      return 'バランス感覚タイプ';
    }

    async function initLiff() {
      if (typeof liff === 'undefined') return;
      try {
        await liff.init({ liffId: LIFF_ID });
        liffReady = true;
      } catch (error) {
        console.error('LIFF初期化失敗', error);
      }
    }

    function startDiagnosis() {
      const checked = getCheckedBoxes();
      if (checked.length !== 3) {
        alert('強く当てはまるものを3つ選んでください。');
        return;
      }

      questionScreen.style.display = 'none';
      resultScreen.classList.remove('active');
      loadingScreen.classList.add('active');

      window.setTimeout(() => {
        showResult(checked);
      }, 900);
    }

    function showResult(checked) {
      const selectedValues = checked.map((item) => Number(item.value));
      const resultType = getDiagnosisResult(selectedValues);
      const resultDescription = typeDescriptions[resultType] || '';
      const selectedLabels = checked
        .map((item) => item.closest('.question-item').querySelector('.question-text').textContent.trim())
        .filter(Boolean);

      latestMessage = `≪あなたの感覚タイプ診断≫\n【選択した項目】\n・${selectedLabels.join('\n・')}\n\n【診断結果】\n・${resultType}\n\n【タイプ説明】\n${resultDescription}`;

      resultTypeEl.textContent = resultType;
      resultDescriptionEl.textContent = resultDescription;

      loadingScreen.classList.remove('active');
      resultScreen.classList.add('active');
    }

    async function sendToLine() {
      if (!latestMessage) {
        alert('先に診断してください。');
        return;
      }

      if (!liffReady) {
        alert('LIFFの初期化が完了していません。');
        return;
      }

      try {
        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        if (!liff.isInClient()) {
          alert('LINEアプリ内で開くと送信できます。');
          return;
        }

        await liff.sendMessages([{ type: 'text', text: latestMessage }]);
        alert('LINEに送信しました');
        liff.closeWindow();
      } catch (error) {
        console.error('送信失敗', error);
        alert('LINE送信に失敗しました。LIFF設定をご確認ください。');
      }
    }

    diagnoseButton.addEventListener('click', startDiagnosis);
    sendButton.addEventListener('click', sendToLine);
    syncCheckboxState();
    initLiff();
  </script>
</body>
</html>
